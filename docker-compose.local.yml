# =============================================================================
# Local AI Assistant - Local Development Docker Compose
# =============================================================================
#
# This file runs infrastructure services (Qdrant, Redis, Ollama)
# with ports exposed to the host machine, allowing you to run the Next.js app
# locally with `npm run dev` while using Docker for infrastructure.
#
# USAGE:
#   Start:  docker compose -f docker-compose.local.yml up -d
#   Stop:   docker compose -f docker-compose.local.yml down
#   Clean:  docker compose -f docker-compose.local.yml down -v
#
# With Ollama: docker compose -f docker-compose.local.yml --profile ollama up -d
#
# Make sure your .env.local has:
#   DATABASE_PROVIDER=postgres  (or sqlite)
#   DATABASE_URL=postgresql://laap:laap-local-password@localhost:5432/laap
#   QDRANT_HOST=localhost
#   REDIS_URL=redis://localhost:6379
#   OLLAMA_API_BASE=http://localhost:11434
#
# =============================================================================

services:
  # Qdrant Vector Store
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: local-ai-assistant-qdrant-local
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/readyz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: local-ai-assistant-redis-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  # For local development with DATABASE_PROVIDER=postgres
  postgres:
    image: postgres:16-alpine
    container_name: laap-postgres-local
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-laap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-laap-local-password}
      POSTGRES_DB: ${POSTGRES_DB:-laap}
    volumes:
      - laap-pgdata-local:/var/lib/postgresql/data
      - ./src/lib/db/schema/postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laap}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama Local LLM Server
  # Start with: docker compose -f docker-compose.local.yml --profile ollama up -d
  # Models: qwen3:1.7b, qwen3.5:0.8b, qwen3-embedding:0.6b, bbjson/bge-reranker-base
  ollama:
    image: ollama/ollama:0.21.2
    container_name: local-ai-assistant-ollama-local
    profiles:
      - ollama
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models-local:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    environment:
      # Default model to pre-load
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:1.7b}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-8192}
      # Pull additional models on startup (LLMs only - embeddings/reranking use local models)
      - OLLAMA_PULL_MODELS=${OLLAMA_PULL_MODELS:-qwen3:1.7b,qwen3.5:0.8b}
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  laap-pgdata-local:
    name: laap-pgdata-local
  ollama-models-local:
    name: local-ai-assistant-ollama-models-local
