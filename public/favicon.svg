<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1e3a5f"/>
  
  <!-- Neural network nodes (internal connected system) -->
  <!-- Central node -->
  <circle cx="16" cy="16" r="3" fill="#60a5fa"/>
  
  <!-- Surrounding nodes -->
  <circle cx="10" cy="10" r="2" fill="#3b82f6"/>
  <circle cx="22" cy="10" r="2" fill="#3b82f6"/>
  <circle cx="10" cy="22" r="2" fill="#3b82f6"/>
  <circle cx="22" cy="22" r="2" fill="#3b82f6"/>
  
  <!-- Internal connections (solid - representing internal network) -->
  <line x1="10" y1="10" x2="16" y2="16" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="10" x2="16" y2="16" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="22" x2="16" y2="16" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="22" x2="16" y2="16" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Air-gap indicator: severed external connection -->
  <!-- Left broken link -->
  <line x1="3" y1="16" x2="7" y2="16" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="14" x2="8" y2="18" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Right broken link -->
  <line x1="25" y1="16" x2="29" y2="16" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="24" y2="18" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Activity pulse indicator (small dot showing "running") -->
  <circle cx="16" cy="6" r="1.5" fill="#22c55e"/>
</svg>
