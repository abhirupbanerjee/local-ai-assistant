# =============================================================================
# Local AI Assistant - Development Docker Compose
# =============================================================================
#
# This file is for development/testing purposes only.
# For local development with infrastructure services, use docker-compose.local.yml
#
# USAGE:
#   Start:  docker compose -f docker-compose.dev.yml up -d
#   Stop:   docker compose -f docker-compose.dev.yml down
#
# =============================================================================

services:
  # Qdrant Vector Store
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: local-ai-assistant-qdrant-dev
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/readyz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: local-ai-assistant-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database (optional)
  postgres:
    image: postgres:16-alpine
    container_name: laap-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-laap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password-laap-db@123}
      POSTGRES_DB: ${POSTGRES_DB:-laap}
    volumes:
      - laap-pgdata-dev:/var/lib/postgresql/data
      - ./src/lib/db/schema/postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laap}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  laap-pgdata-dev:
    name: laap-pgdata-dev
