# =============================================================================
# LITELLM PROXY CONFIGURATION
#
# Chat models for OpenAI, Anthropic, Gemini, Mistral, DeepSeek are NOT listed
# here — they are registered dynamically by the app via /model/new API
# (see src/lib/services/litellm-sync.ts).
#
# Only models that need special handling are listed below:
#   - Fireworks: model path format differs from DB IDs
#   - Ollama: uses api_base instead of api_key
#   - Embeddings/Audio: not managed by the sync service
#
# Updated: March 2026
# =============================================================================

model_list:

  # ===========================================================================
  # OLLAMA LOCAL MODELS
  # ===========================================================================
  - model_name: llama3.2:3b
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://ollama:11434
    model_info:
      supports_function_calling: true

  - model_name: qwen3:4b
    litellm_params:
      model: ollama/qwen3:4b
      api_base: http://ollama:11434
    model_info:
      supports_function_calling: true

  - model_name: qwen3:1.7b
    litellm_params:
      model: ollama/qwen3:1.7b
      api_base: http://ollama:11434
    model_info:
      supports_function_calling: true

  - model_name: gpt-oss:20b
    litellm_params:
      model: ollama/gpt-oss:20b
      api_base: http://ollama:11434
    model_info:
      supports_function_calling: true

  # ===========================================================================
  # FIREWORKS AI MODELS (SOC2 / GDPR / HIPAA — Zero Data Retention)
  # ===========================================================================
  - model_name: fireworks/minimax-m2p5
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/minimax-m2p5
      api_key: os.environ/FIREWORKS_AI_API_KEY
    model_info:
      supports_function_calling: true
      supports_vision: true
      max_input_tokens: 1000000
      max_output_tokens: 16384

  - model_name: fireworks/kimi-k2p5
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/kimi-k2p5
      api_key: os.environ/FIREWORKS_AI_API_KEY
    model_info:
      supports_function_calling: true
      supports_vision: false
      max_input_tokens: 131072
      max_output_tokens: 16384

  - model_name: fireworks/gpt-oss-120b
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/gpt-oss-120b
      api_key: os.environ/FIREWORKS_AI_API_KEY
    model_info:
      supports_function_calling: true
      supports_vision: false
      max_input_tokens: 131072
      max_output_tokens: 16384

  - model_name: fireworks/qwen3p6-plus
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/qwen3p6-plus
      api_key: os.environ/FIREWORKS_AI_API_KEY
    model_info:
      supports_function_calling: true
      supports_vision: true
      max_input_tokens: 131072
      max_output_tokens: 16384

  - model_name: fireworks/minimax-m2p7
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/minimax-m2p7
      api_key: os.environ/FIREWORKS_AI_API_KEY
    model_info:
      supports_function_calling: true
      supports_vision: false
      max_input_tokens: 131072
      max_output_tokens: 16384

  # ===========================================================================
  # EMBEDDING MODELS
  # ===========================================================================

  # Fireworks AI embeddings
  - model_name: nomic-ai/nomic-embed-text-v1.5
    litellm_params:
      model: fireworks_ai/nomic-ai/nomic-embed-text-v1.5
      api_key: os.environ/FIREWORKS_AI_API_KEY

  - model_name: fireworks/qwen3-embedding-8b
    litellm_params:
      model: fireworks_ai/fireworks/qwen3-embedding-8b
      api_key: os.environ/FIREWORKS_AI_API_KEY

  # OpenAI embeddings
  - model_name: text-embedding-3-large
    litellm_params:
      model: openai/text-embedding-3-large
      api_key: os.environ/OPENAI_API_KEY

  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

  - model_name: mistral-embed
    litellm_params:
      model: mistral/mistral-embed
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: text-embedding-004
    litellm_params:
      model: gemini/text-embedding-004
      api_key: os.environ/GEMINI_API_KEY

  - model_name: mxbai-embed-large
    litellm_params:
      model: ollama/mxbai-embed-large
      api_base: http://ollama:11434

  # ===========================================================================
  # AUDIO/TRANSCRIPTION MODELS
  # ===========================================================================
  - model_name: whisper-1
    litellm_params:
      model: openai/whisper-1
      api_key: os.environ/OPENAI_API_KEY

  - model_name: voxtral-mini
    litellm_params:
      model: mistral/voxtral-mini-latest
      api_key: os.environ/MISTRAL_API_KEY

# =============================================================================
# LITELLM SETTINGS
# =============================================================================

litellm_settings:
  drop_params: true
  request_timeout: 300

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # database_url: os.environ/LITELLM_DATABASE_URL
  disable_spend_logs: true
  store_model_in_db: false
