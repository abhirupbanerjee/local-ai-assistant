# =============================================================================
# Local AI Assistant - Docker Compose Configuration
# =============================================================================
#
# SETUP: Volume permissions are handled automatically by the entrypoint.
#   For non-Docker development, run ./setup.sh first.
#
# PROFILES: Use profiles to select which services to run:
#
#   Vector Store:
#     --profile qdrant      → Qdrant vector store
#
#   Database:
#     --profile postgres    → PostgreSQL
#
#   Local LLM:
#     --profile ollama      → Ollama (set OLLAMA_API_BASE=http://ollama:11434)
#
# EXAMPLES:
#   PostgreSQL + Qdrant:   docker compose --profile postgres --profile qdrant up -d
#   PostgreSQL + Qdrant + Ollama: docker compose --profile postgres --profile qdrant --profile ollama up -d
#
# =============================================================================

services:
  traefik:
    image: traefik:v3.6.1
    container_name: local-ai-assistant-traefik
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Increase timeouts for SSE/long-running autonomous mode (30 minutes)
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=1800s"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=1800s"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=1800s"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - local-ai-assistant-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-ai-assistant-app
    environment:
      - NODE_ENV=production
      # Vector Store Configuration
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      # Database Configuration
      - DATABASE_PROVIDER=${DATABASE_PROVIDER:-sqlite}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-laap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-laap}
      # Other Services
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/app/data
      - CONFIG_DIR=/app/config
      # Ollama for local LLM (direct, no LiteLLM)
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://ollama:11434}
      - OLLAMA_RERANKER_MODEL=${OLLAMA_RERANKER_MODEL:-bbjson/bge-reranker-base}
      # Fix transformers cache permission (reranker model caching)
      - TRANSFORMERS_CACHE=/tmp/transformers_cache
      - XDG_CACHE_HOME=/tmp/cache
      # Hugging Face token for downloading gated models (local embeddings)
      - HF_TOKEN=${HF_TOKEN}
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
      # Increase timeouts for SSE/long-running autonomous mode connections
      - "traefik.http.middlewares.sse-timeout.headers.customRequestHeaders.Connection=keep-alive"
      - "traefik.http.routers.app.middlewares=sse-timeout"
      # SSE streaming: flush immediately for real-time updates
      - "traefik.http.services.app.loadbalancer.responseForwarding.flushInterval=100ms"
    volumes:
      - ./data/app:/app/data
      - ./config:/app/config:ro
      - ./data/transformers_cache:/tmp/transformers_cache  # Persist BGE reranker models (~670MB)
    # PostgreSQL: waits for healthy status when the postgres profile is active.
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
        required: false  # Only enforced when postgres profile is active
    networks:
      - local-ai-assistant-network
    restart: unless-stopped

  # Qdrant Vector Store
  # Start with: docker compose --profile qdrant up -d
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: local-ai-assistant-qdrant
    profiles:
      - qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/readyz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - local-ai-assistant-network

  # PostgreSQL Database (optional - use when DATABASE_PROVIDER=postgres)
  # Start with: docker compose --profile postgres up -d
  postgres:
    image: postgres:16-alpine
    container_name: local-ai-assistant-postgres
    restart: unless-stopped
    profiles:
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-laap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-laap}
    volumes:
      - local-ai-assistant-pgdata:/var/lib/postgresql/data
      # Auto-run on first init (only executes once when DB is created)
      - ./src/lib/db/schema/postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-ai-assistant-network

  redis:
    image: redis:7-alpine
    container_name: local-ai-assistant-redis
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - local-ai-assistant-network
    restart: unless-stopped

  # Ollama Local LLM Server
  # Start with: docker compose --profile ollama up -d
  # Models: qwen3:1.7b, qwen3.5:0.8b, qwen3-embedding:0.6b, bbjson/bge-reranker-base
  ollama:
    image: ollama/ollama:0.21.2
    container_name: local-ai-assistant-ollama
    profiles:
      - ollama
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    volumes:
      - ollama-models:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    environment:
      # Default models to pre-load
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:1.7b}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-8192}
      # Pull additional models on startup (includes embedding model for RAG)
      - OLLAMA_PULL_MODELS=${OLLAMA_PULL_MODELS:-qwen3:1.7b,qwen3.5:0.8b,qwen3-embedding:0.6b,bbjson/bge-reranker-base}
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - local-ai-assistant-network
    restart: unless-stopped

networks:
  local-ai-assistant-network:
    name: local-ai-assistant-network

volumes:
  letsencrypt:
    name: local-ai-assistant-letsencrypt
  local-ai-assistant-pgdata:
    name: local-ai-assistant-pgdata
  ollama-models:
    name: local-ai-assistant-ollama-models
